<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Teal background with rounded corners -->
  <rect width="100" height="100" rx="22" fill="#015c61"/>

  <!-- Edges (white lines) -->
  <g stroke="#f0f9fa" stroke-width="3" stroke-linecap="round">
    <!-- Top node to upper-left and upper-right -->
    <line x1="50" y1="14" x2="16" y2="38"/>
    <line x1="50" y1="14" x2="84" y2="38"/>
    <!-- Upper horizontal -->
    <line x1="16" y1="38" x2="84" y2="38"/>
    <!-- Cross diagonals (form an X) -->
    <line x1="16" y1="38" x2="84" y2="68"/>
    <line x1="84" y1="38" x2="16" y2="68"/>
    <!-- Lower horizontal -->
    <line x1="16" y1="68" x2="84" y2="68"/>
    <!-- Lower nodes to bottom -->
    <line x1="16" y1="68" x2="50" y2="88"/>
    <line x1="84" y1="68" x2="50" y2="88"/>
  </g>

  <!-- Nodes (filled circles, white) -->
  <g fill="#f0f9fa">
    <circle cx="50" cy="14" r="5.5"/>
    <circle cx="16" cy="38" r="5.5"/>
    <circle cx="84" cy="38" r="5.5"/>
    <circle cx="16" cy="68" r="5.5"/>
    <circle cx="84" cy="68" r="5.5"/>
    <circle cx="50" cy="88" r="5.5"/>
  </g>
</svg>
